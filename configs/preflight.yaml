# Pre-flight config (proposal §5).
# Keep in sync with hpc_speech/config.py defaults.
frontend:
  model_name: biaofu-xmu/wav2vec-S-Large-ft-960h
  main_context: 8
  right_context: 4
  tap_layers: [6, 12, 18, 24]
  freeze: true
  hidden_size: 1024

trunk:
  num_levels: 5
  d: 1024
  num_heads: 8
  ffn_mult: 4
  conv_kernel: 15
  blocks_per_level: 2
  dropout: 0.1
  predictor_rank: 128
  predictor_lag_k: 4
  state_rank: 64
  tap_injection: [0, 1, 2, 3, -1]

cpc:
  hidden: 256
  horizon_k: 12
  num_negatives: 32

loss:
  alpha_pred: 0.1
  eta_cpc: 0.1
  pred_level_weights: [1.0, 1.0, 1.0, 1.0]

training:
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-4
  warmup_steps: 2000
  max_steps: 50000
  save_steps: 5000
  eval_steps: 5000
  logging_steps: 50
